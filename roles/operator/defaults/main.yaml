---

# Operator state?
# One of 'present' or 'absent'
svo_state: present

# The installation name.
# Used to select a 'sensitive-<name>.vault' file of sensitive (vault) variables
# (e.g. 'sensitive-scw-production.vault'). The matching file must be present in
# the role's 'vars' directory and is loaded when the playbooks run (you will be
# prompted for the vault password). Leave blank to skip loading vault variables.
svo_installation_name: ''

# The kubernetes config file.
svo_kubeconfig: ''

# The Operator container image and tag.
# This is the (public, DockerHub) image produced by the
# 'squonk2-data-manager-viz-operator' repository.
svo_image: informaticsmatters/data-manager-viz-operator
svo_image_tag: SetMe

# The namespace of the Viz Operator.
svo_namespace: data-manager-viz-operator
# The colon-separated list of namespaces
# we want the CRD to be used with.
svo_namespaces: data-manager-api

# The domain routed to the Cluster.
# Used as the base for the visualisation instance ingresses.
svo_ingress_domain: example.com
# A pre-defined ingress TLS secret?
# If one is named it is used by the instance ingress
# and the cert-manager annotation is removed.
# This is passed to the operator through the environment.
svo_ingress_tls_secret: ''
# A certificate issuer (ignored if svo_ingress_tls_secret is set)
svo_ingress_cert_issuer: letsencrypt-nginx-production

# The namespace of the Data Manager API.
# It's here we deploy the 'rbac-data-manager', ConfigMap and
# image-pull Secret objects.
svo_dm_namespace: data-manager-api

# Visualisation instance node selection.
# Instances will be run on nodes that have the label key and value defined here.
svo_pod_node_selector_key: informaticsmatters.com/purpose-application
svo_pod_node_selector_value: 'yes'

# A priority class for the operator Pod
svo_priority_class: ''
# Apply a priority class to the instance Pods the operator launches.
# Any non-empty value enables it (the operator applies
# 'svo_default_pod_priority_class').
svo_apply_pod_priority_class: no
svo_default_pod_priority_class: im-application-low

# The image-pull Secret.
# The visualisation image is private (on ghcr) so Kubernetes needs an
# ImagePullSecret to pull it. We deploy a Secret (of this name) into the
# Data Manager namespace and pass its *name* to the operator through the
# 'SVO_IMAGE_PULL_SECRET' environment variable.
svo_image_pull_secret_name: svo-pullsecret
# The base64-encoded '.dockerconfigjson' value for the image-pull Secret.
# This is sensitive - provide it through an Ansible Vault file
# (e.g. 'sensitive-<name>.vault') or a parameters file, never in plain text.
svo_github_image_pull_secret: ''

# Costing information (exposed to the Data Manager through the ConfigMap)
svo_cost_cost: '1.00'
svo_cost_period: '1 hour'
